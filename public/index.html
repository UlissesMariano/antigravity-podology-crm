<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podology CRM - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="container auth-container">
        <!-- Login Form -->
        <div class="glass-card auth-card" id="login-card">
            <div class="card-header">
                <div class="logo">
                    <i class="fa-solid fa-leaf"></i>
                    <h2>PodoCRM</h2>
                </div>
                <p>Bem-vindo de volta! Por favor, faça o login.</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="login-username">Usuário (Login)</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="login-username" placeholder="Seu login de acesso" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="login-password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="auth-error" id="login-error"></div>

                <button type="submit" class="btn btn-primary btn-block">
                    Entrar <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="card-footer">
                <p>Não tem uma conta? <a href="#" id="show-register">Cadastre-se</a></p>
            </div>
        </div>

        <!-- Registration Form (Hidden by default) -->
        <div class="glass-card auth-card hidden" id="register-card">
            <div class="card-header">
                <div class="logo">
                    <i class="fa-solid fa-leaf"></i>
                    <h2>PodoCRM</h2>
                </div>
                <p>Crie sua conta para começar a gerenciar.</p>
            </div>

            <form id="register-form">
                <div class="input-group">
                    <label for="register-name">Nome Completo</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="register-name" placeholder="Dr. João Silva" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="register-username">Usuário (Login)</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="register-username" placeholder="Seu login de acesso" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="register-password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="register-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="auth-error" id="register-error"></div>

                <button type="submit" class="btn btn-primary btn-block">
                    Criar Conta <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <div class="card-footer">
                <p>Já tem uma conta? <a href="#" id="show-login">Faça Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=3"></script>
</body>

</html>
